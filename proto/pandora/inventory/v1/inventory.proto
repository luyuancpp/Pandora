// Pandora InventoryService 协议(背包,W5 ③ 2026-06-18)。
//
// 职责(docs/design/go-services.md §2.9 economy 域):
//   - 玩家货币(金币)余额读写
//   - 背包道具持有(按 item_config_id 堆叠计数)
//   - 大厅态道具使用(开箱 / 经验书 / 消耗品)与出售换金币
//
// 边界(docs/design/ds-arch.md §0.1):
//   - 战斗内即时用道具 / 出装 / 购买道具 = UE GAS(GameplayEffect),不经 gRPC;
//   - 本服务只管大厅态持久化与经济结算,反作弊靠 WATCH/MULTI/EXEC 乐观锁 + 幂等键。
//
// 不变量(CLAUDE.md §9.7):交易/扣减必须原子 + 有补偿幂等键;
//   GrantItems / UseItem / SellItem 全部带 idempotency_key,同键只生效一次。

syntax = "proto3";

package pandora.inventory.v1;

import "pandora/common/v1/errcode.proto";

service InventoryService {
  // GetInventory 读玩家背包(货币 + 道具堆叠);客户端可见结构,不下发存储字段。
  rpc GetInventory(GetInventoryRequest) returns (GetInventoryResponse);

  // GrantItems 幂等发放道具 / 货币(系统驱动:战后掉落 / 活动 / 购买到账)。
  rpc GrantItems(GrantItemsRequest) returns (GrantItemsResponse);

  // UseItem 大厅态使用消耗品(开箱 / 经验书等);战斗内即时道具走 GAS,不走此 RPC。
  rpc UseItem(UseItemRequest) returns (UseItemResponse);

  // SellItem 出售道具换金币(原子扣道具 + 加金币)。
  rpc SellItem(SellItemRequest) returns (SellItemResponse);

  // FreezeForOrder 拍卖挂单冻结资产(系统接口,仅后端内部直连):
  //   卖单(SELL):把 quantity 个 item_config_id 从活跃背包移入托管(escrow),挂单期间不可被别处消耗;
  //   买单(BUY):把 quantity*unit_price 金币从活跃余额移入托管,出价期间锁定。
  // 幂等键 = order_id(挂单雪花),同一挂单重复冻结只生效一次;资产不足 → ERR_INVENTORY_INSUFFICIENT。
  // 与 SettleAuctionMatch / ReleaseEscrow 配套:成交从 escrow 消费、撤单 / 过期从 escrow 退还。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc FreezeForOrder(FreezeForOrderRequest) returns (FreezeForOrderResponse);

  // SettleAuctionMatch 原子结算一笔拍卖成交(系统接口,仅后端内部直连):
  //   同一 MySQL 本地事务里从双方 escrow 消费完成资产对转 ——
  //     卖家:从卖单 escrow 消费 quantity 个 item_config_id 交付买家,卖家加 quantity*unit_price 金币;
  //     买家:从买单 escrow 消费 quantity*unit_price 金币付给卖家,买家加 quantity 个 item_config_id。
  // 因双方资产已在 FreezeForOrder 阶段冻结,成交不会因余额不足失败。
  // 幂等键 = match_id(雪花),同一成交重复结算只生效一次(不变量 §9.2 / §9.7)。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc SettleAuctionMatch(SettleAuctionMatchRequest) returns (SettleAuctionMatchResponse);

  // SettlePlayerTrade 原子结算一笔玩家间点对点交易(系统接口,仅后端内部直连):
  //   与拍卖不同,P2P 交易无 escrow 预冻,直接从双方活跃背包 / 余额在同一 MySQL 本地事务里对转 ——
  //     卖家:手 seller_items 给买家,收 buyer_items + price 金币;
  //     买家:手 buyer_items + price 金币给卖家,收 seller_items。
  //   任一方道具 / 金币不足 → ERR_INVENTORY_INSUFFICIENT,整笔回滚。
  // 幂等键 = order_id(雪花),同一订单重复结算只生效一次(不变量 §9.7)。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc SettlePlayerTrade(SettlePlayerTradeRequest) returns (SettlePlayerTradeResponse);

  // ReleaseEscrow 拍卖挂单托管退还(系统接口,仅后端内部直连):
  //   撤单 / 过期 / 完全成交后把某挂单 escrow 的残余资产退回玩家活跃余额并关闭托管。
  //   卖单残余 = 未成交道具;买单残余 = 未成交金币 + 成交价优于出价的价差返还。
  // 幂等键 = order_id,重复退还只生效一次(escrow status=closed 后再调为 no-op)。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc ReleaseEscrow(ReleaseEscrowRequest) returns (ReleaseEscrowResponse);
}

// EscrowSide 冻结方向(对齐 auction OrderSide:SELL=1 冻道具 / BUY=2 冻金币)。
enum EscrowSide {
  ESCROW_SIDE_UNSPECIFIED = 0;
  ESCROW_SIDE_SELL        = 1;  // 卖单:冻结道具
  ESCROW_SIDE_BUY         = 2;  // 买单:冻结金币
}

// ItemStack 是背包里某配置道具的持有堆叠(客户端可见结构)。
// item_config_id 是道具配置 ID(uint32,§12);count 是持有数量(>0)。
message ItemStack {
  uint32 item_config_id = 1;
  int64  count          = 2;
}

// ItemGrant 是一次发放里对某配置道具增加的数量(count>0)。
message ItemGrant {
  uint32 item_config_id = 1;
  int64  count          = 2;
}

// CurrencyKind 货币类型(枚举底层 int32,§13;不属于 ID 规则)。
enum CurrencyKind {
  CURRENCY_KIND_UNSPECIFIED = 0;
  CURRENCY_KIND_GOLD        = 1;  // 金币(出售道具 / 大厅经济主货币)
}

// Inventory 是玩家背包快照(客户端可见结构)。
message Inventory {
  uint64 player_id = 1;
  int64  gold      = 2;  // 金币余额
  repeated ItemStack items = 3;
}

message GetInventoryRequest {
  uint64 player_id = 1;
}

message GetInventoryResponse {
  pandora.common.v1.ErrCode code = 1;
  Inventory inventory = 2;
}

// GrantItemsRequest 幂等发放(idempotency_key 防重复入账,来源:drop:<match_id> / reward:<id>)。
message GrantItemsRequest {
  uint64 player_id       = 1;
  repeated ItemGrant items = 2;  // 每条 count 须 > 0
  int64  gold            = 3;    // 同时发放金币(>=0)
  string idempotency_key = 4;
}

message GrantItemsResponse {
  pandora.common.v1.ErrCode code = 1;
  int64 gold = 2;  // 发放后金币余额
}

// UseItemRequest 大厅态使用消耗品(数量不足 → ERR_INVENTORY_INSUFFICIENT;
// 不可大厅使用 → ERR_INVENTORY_ITEM_NOT_USABLE)。
message UseItemRequest {
  uint64 player_id       = 1;
  uint32 item_config_id  = 2;
  int64  count           = 3;  // 须 > 0
  string idempotency_key = 4;
}

message UseItemResponse {
  pandora.common.v1.ErrCode code = 1;
  int64 remaining = 2;  // 使用后该道具剩余数量
}

// SellItemRequest 出售道具换金币(数量不足 → ERR_INVENTORY_INSUFFICIENT;
// 不可出售 → ERR_INVENTORY_NOT_SELLABLE)。
message SellItemRequest {
  uint64 player_id       = 1;
  uint32 item_config_id  = 2;
  int64  count           = 3;  // 须 > 0
  string idempotency_key = 4;
}

message SellItemResponse {
  pandora.common.v1.ErrCode code = 1;
  int64 remaining = 2;  // 出售后该道具剩余数量
  int64 gold      = 3;  // 出售后金币余额
}

// SettleAuctionMatchRequest 拍卖成交结算(系统接口,后端内部直连)。
// 幂等键 = match_id;总价 = quantity * unit_price(在 inventory 端做溢出安全乘法)。
// 资产从双方挂单 escrow 消费,故须带 sell_order_id / buy_order_id 定位 escrow。
message SettleAuctionMatchRequest {
  uint64 match_id       = 1;  // 成交幂等键(雪花 uint64,§11)
  uint64 seller_id      = 2;  // 卖家 player_id(交付道具 / 收金币)
  uint64 buyer_id       = 3;  // 买家 player_id(付金币 / 收道具)
  uint32 item_config_id = 4;  // 成交道具配置 ID(uint32,§12)
  int64  quantity       = 5;  // 成交数量(> 0)
  int64  unit_price     = 6;  // 成交单价金币(> 0,被动挂单价)
  uint64 sell_order_id  = 7;  // 卖单 order_id(定位卖家道具 escrow)
  uint64 buy_order_id   = 8;  // 买单 order_id(定位买家金币 escrow)
}

message SettleAuctionMatchResponse {
  pandora.common.v1.ErrCode code = 1;
}

// SettlePlayerTradeRequest 玩家间点对点交易结算(系统接口,后端内部直连)。
// 幂等键 = order_id;无 escrow,直接从双方活跃背包 / 余额原子对转。
message SettlePlayerTradeRequest {
  uint64 order_id     = 1;  // 交易订单 order_id(结算幂等键,雪花 uint64,§11)
  uint64 seller_id    = 2;  // 卖家 player_id(交 seller_items,收 buyer_items + price)
  uint64 buyer_id     = 3;  // 买家 player_id(交 buyer_items + price,收 seller_items)
  repeated ItemGrant seller_items = 4;  // 卖家交付给买家的道具(每条 count > 0)
  repeated ItemGrant buyer_items  = 5;  // 买家交付给卖家的道具(可空 = 纯金币购买)
  int64  price        = 6;  // 买家付卖家的金币(>= 0)
}

message SettlePlayerTradeResponse {
  pandora.common.v1.ErrCode code = 1;
}

// FreezeForOrderRequest 挂单冻结资产(系统接口,后端内部直连)。
// 幂等键 = order_id;SELL 冻 quantity 道具,BUY 冻 quantity*unit_price 金币(溢出安全乘)。
message FreezeForOrderRequest {
  uint64     player_id      = 1;  // 挂单玩家 player_id
  uint64     order_id       = 2;  // 挂单 order_id(冻结幂等键 + escrow 键)
  EscrowSide side           = 3;  // SELL=冻道具 / BUY=冻金币
  uint32     item_config_id = 4;  // 道具配置 ID(uint32,§12)
  int64      quantity       = 5;  // 挂单数量(> 0)
  int64      unit_price     = 6;  // 挂单单价金币(> 0;BUY 冻 quantity*unit_price)
}

message FreezeForOrderResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ReleaseEscrowRequest 退还挂单 escrow 残余(系统接口,后端内部直连)。幂等键 = order_id。
message ReleaseEscrowRequest {
  uint64 player_id = 1;  // 挂单玩家 player_id
  uint64 order_id  = 2;  // 挂单 order_id(escrow 键)
}

message ReleaseEscrowResponse {
  pandora.common.v1.ErrCode code = 1;
}
