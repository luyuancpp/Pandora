// Pandora ChatService 协议。
//
// 职责(docs/design/go-services.md §2.5):频道(世界 / 队伍 / 私聊)
//
// ⚠️ 推送架构(ds-arch.md §0.8):
//   go-zero zrpc 不支持 gRPC server stream。
//   消息通过 kafka 推送给 Hub DS,DS 转 UE ClientRPC 给客户端:
//     pandora.chat.world    世界频道(key=hub_pod / 全局)
//     pandora.chat.team     队伍频道(key=team_id)
//     pandora.chat.private  私聊(key=target_player_id)
//     pandora.chat.guild    公会频道(key=接收方 player_id)
//     pandora.chat.group    临时群频道(key=接收方 player_id)
//   本 service **只提供发送 RPC**,接收靠 kafka 推送链路。

syntax = "proto3";

package pandora.chat.v1;

import "pandora/common/v1/errcode.proto";

service ChatService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc PullHistory(PullHistoryRequest) returns (PullHistoryResponse);  // 拉历史(私聊离线消息等)
}

enum ChatChannel {
  CHAT_CHANNEL_UNSPECIFIED = 0;
  CHAT_CHANNEL_WORLD       = 1;
  CHAT_CHANNEL_TEAM        = 2;  // 组队队伍(target_id = team_id)
  CHAT_CHANNEL_PRIVATE     = 3;  // 私聊(target_id = 对方 player_id,落库支持离线历史)
  CHAT_CHANNEL_SYSTEM      = 4;  // 服务端→客户端,客户端不能发
  CHAT_CHANNEL_GUILD       = 5;  // 公会频道(target_id = guild_id;即时,不落库)
  CHAT_CHANNEL_GROUP       = 6;  // 临时群频道(target_id = group_id;即时,不落库)
}

message ChatMessage {
  uint64 message_id      = 1;
  uint64 sender_id       = 2;
  string sender_nickname = 3;
  ChatChannel channel    = 4;
  uint64 target_id       = 5;  // PRIVATE = target player; TEAM = team_id; WORLD 为 0
  string content         = 6;  // ≤ 256
  int64  send_time_ms    = 7;
  // 8-9 reserved
  reserved 8 to 9;
}

message SendMessageRequest {
  uint64      sender_id  = 1;
  ChatChannel channel    = 2;
  uint64      target_id  = 3;
  string      content    = 4;
  string      request_id = 5;  // 客户端去重
}

message SendMessageResponse {
  pandora.common.v1.ErrCode code = 1;
  uint64 message_id = 2;
}

message PullHistoryRequest {
  uint64      player_id = 1;
  ChatChannel channel   = 2;
  uint64      peer_id   = 3;  // 私聊用,世界/队伍为 0
  int32       limit     = 4;  // ≤ 100
  int64       before_ms = 5;  // 分页游标
}

message PullHistoryResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated ChatMessage messages = 2;
}

// ===== Kafka 推送 payload =====
//
// 三个 topic 共用同一 payload 类型:
//   pandora.chat.world / pandora.chat.team / pandora.chat.private
// 消费方:Hub DS,按订阅范围(频道 + target)路由到 PlayerController,转 UE ClientRPC。

message ChatPushEvent {
  ChatMessage message      = 1;
  uint64      to_player_id = 2;  // 接收的玩家(也是 kafka key)
  // 3-9 reserved
  reserved 3 to 9;
}
